<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alternate Ending Generator</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(to right, #fdfcfb, #e2d1c3);
    text-align: center;
}

/* Navbar */
nav {
    background: #6d4c41;
    padding: 15px;
    color: white;
    font-size: 22px;
}

/* Header animation */
h1 {
    margin-top: 20px;
    animation: fadeIn 2s ease;
}

/* Cards */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 30px;
}

.card {
    background: white;
    width: 250px;
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: transform 0.3s;
    animation: slideUp 1.5s ease;
}

.card:hover {
    transform: scale(1.1);
}

/* Buttons */
a {
    display: inline-block;
    margin-top: 10px;
    padding: 10px;
    background: #8d6e63;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

a:hover {
    background: #5d4037;
}

/* Animations */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes slideUp {
    from {transform: translateY(50px); opacity: 0;}
    to {transform: translateY(0); opacity: 1;}
}
</style>

</head>
<body>

<nav>📖 Alternate Ending Generator</nav>

<h1>Choose a Story</h1>

<div class="container">

    <div class="card">
        <h3>Cinderella</h3>
        <p>A classic fairy tale of hope and magic.</p>
        <a href="story1.html">Explore</a>
    </div>

    <div class="card">
        <h3>Romeo & Juliet</h3>
        <p>A tragic love story.</p>
        <a href="story2.html">Explore</a>
    </div>

    <div class="card">
        <h3>The Thirsty Crow</h3>
        <p>A clever crow solves a problem.</p>
        <a href="story3.html">Explore</a>
    </div>

</div>

</body>
  </html>
